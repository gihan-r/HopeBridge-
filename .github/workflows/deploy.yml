name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: "HopeBridge Marketing Website/my-next-app/package-lock.json"
          
      - name: Install dependencies
        run: |
          cd "HopeBridge Marketing Website/my-next-app"
          rm -f yarn.lock
          npm install
          
      - name: Build
        run: |
          cd "HopeBridge Marketing Website/my-next-app"
          npm run build
          
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: "HopeBridge Marketing Website/my-next-app/out"
          branch: gh-pages
          clean: true 